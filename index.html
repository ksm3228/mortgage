<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>주택구입자금 계획표</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#0F1B2D;
    --surface:#16243A;
    --surface-alt:#1D2E47;
    --surface-raised:#22364F;
    --border:rgba(233,239,247,0.08);
    --border-strong:rgba(233,239,247,0.16);
    --gold:#C9A227;
    --gold-light:#E4C660;
    --text:#EAEFF5;
    --muted:#8FA1BC;
    --good:#4CAF7D;
    --bad:#E2665A;
    --font-display:'Noto Serif KR', serif;
    --font-body:'Noto Sans KR', sans-serif;
    --font-mono:'Roboto Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(201,162,39,0.07), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:rgba(201,162,39,0.35); }

  /* ---------- Auth gate ---------- */
  #authGate{
    min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:18px;
    text-align:center; padding:24px;
  }
  #authGate h1{
    font-family:var(--font-display); font-weight:700; font-size:26px; letter-spacing:-0.01em; margin:0;
  }
  #authGate p{ color:var(--muted); margin:0; font-size:14px; }
  .btn-google{
    display:flex; align-items:center; gap:10px; background:var(--surface-alt); border:1px solid var(--border-strong);
    color:var(--text); padding:12px 22px; border-radius:10px; font-size:15px; cursor:pointer; font-family:var(--font-body);
    transition:background .15s ease, transform .15s ease;
  }
  .btn-google:hover{ background:var(--surface-raised); transform:translateY(-1px); }
  #authError{ color:var(--bad); font-size:13px; min-height:18px; }

  /* ---------- App shell ---------- */
  #app{ display:none; max-width:920px; margin:0 auto; padding:28px 18px 80px; }
  header.top{
    display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px; gap:12px; flex-wrap:wrap;
  }
  header.top h1{
    font-family:var(--font-display); font-weight:900; font-size:22px; margin:0; letter-spacing:-0.01em;
    display:flex; align-items:center; gap:10px;
  }
  header.top h1 .mark{
    display:inline-block; width:10px; height:10px; border-radius:2px; background:var(--gold);
    box-shadow:0 0 0 3px rgba(201,162,39,0.18);
  }
  .userbox{ display:flex; align-items:center; gap:10px; font-size:12px; color:var(--muted); }
  .userbox button{
    background:none; border:1px solid var(--border-strong); color:var(--muted); padding:6px 10px; border-radius:8px;
    font-size:12px; cursor:pointer; font-family:var(--font-body);
  }
  .userbox button:hover{ color:var(--text); border-color:var(--gold); }
  #saveStatus{ font-size:11px; color:var(--muted); }

  /* ---------- Tabs ---------- */
  .tabbar{ display:flex; gap:6px; border-bottom:1px solid var(--border); margin-bottom:22px; }
  .tabbtn{
    position:relative; padding:10px 6px 12px; background:none; border:none; color:var(--muted);
    font-family:var(--font-body); font-size:14.5px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tabbtn.active{ color:var(--text); border-bottom-color:var(--gold); }
  .tabbtn input{
    background:none; border:none; color:inherit; font:inherit; width:auto; min-width:40px; max-width:140px;
    padding:0; border-bottom:1px dashed transparent;
  }
  .tabbtn input:focus{ outline:none; border-bottom:1px dashed var(--gold); }
  .tabbtn .editmark{ opacity:0; font-size:11px; transition:opacity .15s; }
  .tabbtn:hover .editmark{ opacity:.6; }

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 20px 18px; margin-bottom:18px;
  }
  .card-title{
    font-family:var(--font-display); font-weight:700; font-size:15px; margin:0 0 14px; display:flex; align-items:center;
    justify-content:space-between; gap:10px;
  }
  .card-title .eyebrow{
    font-family:var(--font-mono); font-size:10.5px; color:var(--gold-light); letter-spacing:.08em; text-transform:uppercase;
    display:block; margin-bottom:4px; font-weight:500;
  }
  .sum-badge{
    font-family:var(--font-mono); font-size:19px; font-weight:700; color:var(--gold-light); white-space:nowrap;
  }

  /* ---------- 총 필요금액 rows ---------- */
  .need-row{ display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px dashed var(--border); }
  .need-row:last-of-type{ border-bottom:none; }
  .need-row label{ flex:1; font-size:13.5px; color:var(--muted); }
  .amount-input{
    width:150px; text-align:right; background:var(--surface-alt); border:1px solid var(--border-strong); color:var(--text);
    font-family:var(--font-mono); font-size:14px; padding:7px 10px; border-radius:8px;
  }
  .amount-input:focus{ outline:none; border-color:var(--gold); }
  .unit{ font-size:12px; color:var(--muted); width:24px; }

  /* ---------- gauge ---------- */
  .gauge-wrap{ margin-top:6px; }
  .gauge-track{
    height:10px; background:var(--surface-alt); border-radius:6px; overflow:hidden; position:relative; border:1px solid var(--border);
  }
  .gauge-fill{ height:100%; background:linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius:6px 0 0 6px; transition:width .3s ease; }
  .gauge-fill.over{ background:linear-gradient(90deg, var(--bad), #f08a80); }
  .gauge-legend{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin-top:6px; font-family:var(--font-mono); }

  /* ---------- budget items (top-level) ---------- */
  .budget-item{
    background:var(--surface); border:1px solid var(--border); border-radius:14px; margin-bottom:14px; overflow:hidden;
  }
  .budget-item-head{
    display:flex; align-items:center; gap:10px; padding:14px 18px; background:var(--surface-alt);
  }
  .budget-item-head .num{
    font-family:var(--font-mono); color:var(--gold-light); font-weight:700; font-size:13px; flex-shrink:0;
  }
  .budget-item-head input.itemname{
    flex:1; background:none; border:none; color:var(--text); font-family:var(--font-display); font-weight:700; font-size:15.5px;
    border-bottom:1px dashed transparent; padding:2px 0;
  }
  .budget-item-head input.itemname:focus{ outline:none; border-bottom:1px dashed var(--gold); }
  .budget-item-head .item-total{ font-family:var(--font-mono); font-size:15px; color:var(--gold-light); font-weight:700; white-space:nowrap; }
  .icon-btn{
    background:none; border:1px solid var(--border-strong); color:var(--muted); width:26px; height:26px; border-radius:7px;
    cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; flex-shrink:0; line-height:1;
  }
  .icon-btn:hover{ color:var(--bad); border-color:var(--bad); }
  .budget-item-body{ padding:6px 18px 16px; }

  .subitem{
    border-top:1px solid var(--border); padding:14px 0 4px;
  }
  .subitem:first-child{ border-top:none; padding-top:10px; }
  .subitem-head{ display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .subitem-head .idx{ font-family:var(--font-mono); font-size:12px; color:var(--muted); width:20px; }
  .subitem-head input.subname{
    background:none; border:none; color:var(--text); font-family:var(--font-body); font-weight:500; font-size:13.5px;
    border-bottom:1px dashed transparent; flex:1; min-width:80px; padding:3px 0;
  }
  .subitem-head input.subname:focus{ outline:none; border-bottom:1px dashed var(--gold); }
  select.typesel{
    background:var(--surface-alt); border:1px solid var(--border-strong); color:var(--muted); font-family:var(--font-body);
    font-size:11.5px; padding:5px 8px; border-radius:7px; cursor:pointer;
  }
  .subitem-body{ display:flex; flex-wrap:wrap; gap:10px 16px; align-items:flex-end; padding-left:28px; }
  .field{ display:flex; flex-direction:column; gap:4px; }
  .field label{ font-size:11px; color:var(--muted); }
  .field input{
    width:110px; background:var(--surface-alt); border:1px solid var(--border-strong); color:var(--text);
    font-family:var(--font-mono); font-size:13px; padding:6px 9px; border-radius:7px; text-align:right;
  }
  .field input:focus{ outline:none; border-color:var(--gold); }
  .subresult{
    font-family:var(--font-mono); font-size:12.5px; color:var(--muted); padding-left:28px; margin-top:8px; line-height:1.7;
  }
  .subresult b{ color:var(--gold-light); font-weight:700; }
  .subresult .method{ display:block; }

  .addbtn{
    background:none; border:1px dashed var(--border-strong); color:var(--muted); font-family:var(--font-body); font-size:12.5px;
    padding:8px 14px; border-radius:9px; cursor:pointer; margin-top:8px;
  }
  .addbtn:hover{ color:var(--gold-light); border-color:var(--gold); }

  .add-top-btn{
    width:100%; background:none; border:1px dashed var(--border-strong); color:var(--muted); font-family:var(--font-body);
    font-size:13.5px; padding:14px; border-radius:12px; cursor:pointer; margin-bottom:18px;
  }
  .add-top-btn:hover{ color:var(--gold-light); border-color:var(--gold); }

  .summary-card{
    display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap;
  }
  .summary-figs{ display:flex; gap:24px; flex-wrap:wrap; }
  .summary-fig{ display:flex; flex-direction:column; gap:2px; }
  .summary-fig .lab{ font-size:11px; color:var(--muted); }
  .summary-fig .val{ font-family:var(--font-mono); font-size:17px; font-weight:700; }
  .summary-fig .val.good{ color:var(--good); }
  .summary-fig .val.bad{ color:var(--bad); }

  @media (max-width:560px){
    .amount-input{ width:120px; }
    .field input{ width:88px; }
  }
</style>
</head>
<body>

<div id="authGate">
  <h1><span style="color:var(--gold-light)">주택구입자금</span> 계획표</h1>
  <p>Google 계정으로 로그인하세요</p>
  <button class="btn-google" id="loginBtn">Google로 로그인</button>
  <div id="authError"></div>
</div>

<div id="app">
  <header class="top">
    <h1><span class="mark"></span>주택구입자금 계획표</h1>
    <div class="userbox">
      <span id="saveStatus">대기중</span>
      <button id="logoutBtn">로그아웃</button>
    </div>
  </header>

  <div class="tabbar" id="tabbar"></div>
  <div id="tabContent"></div>
</div>

<script>
/* ===================== Firebase 설정 =====================
   기존 프로젝트(ward-app-257c4)에서 쓰던 값으로 교체하세요.
   Firebase Console > 프로젝트 설정 > 일반 > 내 앱 에서 확인 가능합니다.
=========================================================== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "ward-app-257c4.firebaseapp.com",
  databaseURL: "https://ward-app-257c4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ward-app-257c4",
  storageBucket: "ward-app-257c4.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const ALLOWED_EMAIL = "kimsungmin83@gmail.com";
const DB_PATH = "homefund/tabs";

/* ===================== 상태 ===================== */
let state = null;           // { tabs: [ {id,name,need:{...},budgetItems:[...]} , ... ] }
let activeTabId = null;
let saveTimer = null;

function uid(){ return Math.random().toString(36).slice(2,10); }

function defaultTab(name){
  return {
    id: uid(),
    name,
    need: { apt:0, expansion:0, aircon:0, etc:0 },
    budgetItems: [
      {
        id: uid(), name:"계약금",
        subItems: [
          { id: uid(), type:"amount", label:"자기자금 (예적금)", amount:0 },
          { id: uid(), type:"amount", label:"대출 (마이너스통장)", amount:0 }
        ]
      },
      {
        id: uid(), name:"잔금",
        subItems: [
          { id: uid(), type:"amount", label:"자기자금 (기존 아파트 매매자금)", amount:0 },
          { id: uid(), type:"amount", label:"대출 (마이너스통장)", amount:0 },
          { id: uid(), type:"saving", label:"적금", monthly:0, months:0, rate:0 },
          { id: uid(), type:"mortgage", label:"주택담보대출", principal:0, years:0, rate:0 }
        ]
      }
    ]
  };
}

function defaultState(){
  return { tabs:[ defaultTab("탭 1"), defaultTab("탭 2"), defaultTab("탭 3") ] };
}

/* ===================== 계산 로직 ===================== */
// 적금 만기 예상액 (단리, 세전) — 매월 초 납입 가정
function calcSaving(monthly, months, ratePct){
  monthly = Number(monthly)||0; months = Number(months)||0; ratePct = Number(ratePct)||0;
  const principal = monthly*months;
  const r = ratePct/100;
  const interest = monthly * r * (months*(months+1)/2) / 12;
  return { principal, interest, total: principal+interest };
}

// 주담대: 원리금균등상환 / 원금균등상환 각각 계산
function calcMortgage(principal, years, ratePct){
  principal = Number(principal)||0; years = Number(years)||0; ratePct = Number(ratePct)||0;
  const n = Math.round(years*12);
  const r = (ratePct/100)/12;
  let equalPI = { totalPay:0, totalInterest:0, monthly:0 };
  let equalPrincipal = { totalPay:0, totalInterest:0, firstMonth:0, lastMonth:0 };
  if(n>0 && principal>0){
    if(r>0){
      const pow = Math.pow(1+r, n);
      const monthly = principal * r * pow / (pow-1);
      equalPI.monthly = monthly;
      equalPI.totalPay = monthly*n;
      equalPI.totalInterest = equalPI.totalPay - principal;
    } else {
      equalPI.monthly = principal/n;
      equalPI.totalPay = principal;
      equalPI.totalInterest = 0;
    }
    const principalPerMonth = principal/n;
    let balance = principal, totalInt = 0, first=0, last=0;
    for(let i=0;i<n;i++){
      const interest = balance*r;
      if(i===0) first = principalPerMonth+interest;
      if(i===n-1) last = principalPerMonth+interest;
      totalInt += interest;
      balance -= principalPerMonth;
    }
    equalPrincipal.totalInterest = totalInt;
    equalPrincipal.totalPay = principal+totalInt;
    equalPrincipal.firstMonth = first;
    equalPrincipal.lastMonth = last;
  }
  return { equalPI, equalPrincipal };
}

function subItemTotal(sub){
  if(sub.type==="amount") return Number(sub.amount)||0;
  if(sub.type==="saving") return calcSaving(sub.monthly, sub.months, sub.rate).total;
  if(sub.type==="mortgage") return Number(sub.principal)||0; // 잔금 충당 관점에서는 대출 원금이 확보금액
  return 0;
}

function budgetItemTotal(item){
  return item.subItems.reduce((s,sub)=>s+subItemTotal(sub),0);
}

function needTotal(need){
  return (Number(need.apt)||0)+(Number(need.expansion)||0)+(Number(need.aircon)||0)+(Number(need.etc)||0);
}

function fmt(n){
  n = Math.round(Number(n)||0);
  return n.toLocaleString('ko-KR');
}

/* ===================== 렌더링 ===================== */
function render(){
  renderTabbar();
  renderTabContent();
}

function renderTabbar(){
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  state.tabs.forEach(tab=>{
    const btn = document.createElement('button');
    btn.className = 'tabbtn' + (tab.id===activeTabId ? ' active':'');
    btn.innerHTML = `<input value="${escapeAttr(tab.name)}" data-tabid="${tab.id}" size="${Math.max(tab.name.length,2)}"> <span class="editmark">✎</span>`;
    btn.addEventListener('click', (e)=>{
      if(e.target.tagName!=='INPUT'){ activeTabId = tab.id; render(); }
    });
    const inp = btn.querySelector('input');
    inp.addEventListener('click', e=>e.stopPropagation());
    inp.addEventListener('input', e=>{
      tab.name = e.target.value;
      inp.size = Math.max(e.target.value.length,2);
      scheduleSave();
    });
    bar.appendChild(btn);
  });
}

function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }

function renderTabContent(){
  const wrap = document.getElementById('tabContent');
  const tab = state.tabs.find(t=>t.id===activeTabId);
  if(!tab){ wrap.innerHTML=''; return; }

  const total = needTotal(tab.need);
  const secured = tab.budgetItems.reduce((s,it)=>s+budgetItemTotal(it),0);
  const diff = secured - total;
  const pct = total>0 ? Math.min(100, (secured/total)*100) : 0;

  let html = '';

  // 총 필요금액 카드
  html += `
  <div class="card">
    <div class="card-title">
      <div><span class="eyebrow">총 필요금액</span>아파트 구입금</div>
      <div class="sum-badge">${fmt(total)} 원</div>
    </div>
    ${needRow('평형(전용/공급)','apt_area_note')}
    ${needRowAmount('아파트 금액','apt')}
    ${needRowAmount('확장비','expansion')}
    ${needRowAmount('에어컨 설치비','aircon')}
    ${needRowAmount('기타 금액','etc')}
  </div>`;

  // 예산 항목들
  html += `<div class="card-title" style="margin:4px 2px 10px;"><span class="eyebrow">예산 계획</span>확보 자금 항목</div>`;
  tab.budgetItems.forEach((item, idx)=>{
    const itTotal = budgetItemTotal(item);
    html += `
    <div class="budget-item" data-itemid="${item.id}">
      <div class="budget-item-head">
        <span class="num">${idx+1}.</span>
        <input class="itemname" data-itemid="${item.id}" value="${escapeAttr(item.name)}">
        <span class="item-total">${fmt(itTotal)} 원</span>
        <button class="icon-btn" data-action="del-item" data-itemid="${item.id}" title="항목 삭제">✕</button>
      </div>
      <div class="budget-item-body">
        ${item.subItems.map((sub,si)=>renderSubItem(item.id, sub, si)).join('')}
        <button class="addbtn" data-action="add-sub" data-itemid="${item.id}">+ 세부항목 추가</button>
      </div>
    </div>`;
  });
  html += `<button class="add-top-btn" data-action="add-top">+ 예산 항목 추가 (예: 3. 인테리어비 등)</button>`;

  // 요약 카드
  html += `
  <div class="card summary-card">
    <div class="summary-figs">
      <div class="summary-fig"><span class="lab">총 필요금액</span><span class="val">${fmt(total)} 원</span></div>
      <div class="summary-fig"><span class="lab">확보 예정 자금</span><span class="val">${fmt(secured)} 원</span></div>
      <div class="summary-fig">
        <span class="lab">${diff>=0?'여유 자금':'부족 자금'}</span>
        <span class="val ${diff>=0?'good':'bad'}">${diff>=0?'+':''}${fmt(diff)} 원</span>
      </div>
    </div>
    <div class="gauge-wrap" style="flex:1; min-width:220px;">
      <div class="gauge-track"><div class="gauge-fill ${diff<0?'over':''}" style="width:${pct}%"></div></div>
      <div class="gauge-legend"><span>확보 ${pct.toFixed(1)}%</span><span>목표 ${fmt(total)} 원</span></div>
    </div>
  </div>`;

  wrap.innerHTML = html;
  attachHandlers(tab);
}

function needRow(label, key){
  return `<div class="need-row"><label>${label}</label><input class="amount-input" style="text-align:left;" data-need="${key}" placeholder="예: 전용59㎡/공급84㎡" type="text"></div>`;
}
function needRowAmount(label, key){
  return `<div class="need-row"><label>${label}</label><input class="amount-input" data-need="${key}" type="number" value=""><span class="unit">원</span></div>`;
}

function renderSubItem(itemId, sub, si){
  const typeOptions = [
    ['amount','금액입력'],['saving','적금 계산'],['mortgage','주담대 계산']
  ].map(([v,l])=>`<option value="${v}" ${sub.type===v?'selected':''}>${l}</option>`).join('');

  let body = '';
  let result = '';

  if(sub.type==='amount'){
    body = `
      <div class="field"><label>금액(원)</label><input type="number" data-field="amount" value=""></div>
    `;
  } else if(sub.type==='saving'){
    const r = calcSaving(sub.monthly, sub.months, sub.rate);
    body = `
      <div class="field"><label>월 납입액(원)</label><input type="number" data-field="monthly" value=""></div>
      <div class="field"><label>납입 개월</label><input type="number" data-field="months" value=""></div>
      <div class="field"><label>연이율(%)</label><input type="number" step="0.01" data-field="rate" value=""></div>
    `;
    result = `<div class="subresult">원금 합계 <b>${fmt(r.principal)}</b>원 + 이자(세전) <b>${fmt(r.interest)}</b>원 = 만기 예상 <b>${fmt(r.total)}</b>원</div>`;
  } else if(sub.type==='mortgage'){
    const r = calcMortgage(sub.principal, sub.years, sub.rate);
    body = `
      <div class="field"><label>대출 원금(원)</label><input type="number" data-field="principal" value=""></div>
      <div class="field"><label>상환기간(년)</label><input type="number" data-field="years" value=""></div>
      <div class="field"><label>연이율(%)</label><input type="number" step="0.01" data-field="rate" value=""></div>
    `;
    result = `
      <div class="subresult">
        <span class="method">① 원리금균등상환 — 월 <b>${fmt(r.equalPI.monthly)}</b>원 × 상환, 총상환액 <b>${fmt(r.equalPI.totalPay)}</b>원 (이자 총 <b>${fmt(r.equalPI.totalInterest)}</b>원)</span>
        <span class="method">② 원금균등상환 — 첫달 <b>${fmt(r.equalPrincipal.firstMonth)}</b>원 → 마지막달 <b>${fmt(r.equalPrincipal.lastMonth)}</b>원, 총상환액 <b>${fmt(r.equalPrincipal.totalPay)}</b>원 (이자 총 <b>${fmt(r.equalPrincipal.totalInterest)}</b>원)</span>
      </div>`;
  }

  return `
  <div class="subitem" data-subid="${sub.id}" data-itemid="${itemId}">
    <div class="subitem-head">
      <span class="idx">${si+1})</span>
      <input class="subname" data-field="label" value="${escapeAttr(sub.label)}">
      <select class="typesel" data-field="type">${typeOptions}</select>
      <button class="icon-btn" data-action="del-sub" data-itemid="${itemId}" data-subid="${sub.id}" title="세부항목 삭제">✕</button>
    </div>
    <div class="subitem-body">${body}</div>
    ${result}
  </div>`;
}

/* ===================== 이벤트 바인딩 ===================== */
function attachHandlers(tab){
  // 필요금액 입력
  document.querySelectorAll('[data-need]').forEach(inp=>{
    const key = inp.dataset.need;
    inp.value = (key==='apt_area_note') ? (tab.need.apt_area_note||'') : (tab.need[key] || (tab.need[key]===0?0:''));
    inp.addEventListener('input', ()=>{
      tab.need[key] = inp.type==='number' ? Number(inp.value) : inp.value;
      renderTabContent();
      scheduleSave();
    });
  });

  // 항목명 변경 / 삭제
  document.querySelectorAll('.itemname').forEach(inp=>{
    inp.addEventListener('input', ()=>{
      const item = tab.budgetItems.find(i=>i.id===inp.dataset.itemid);
      item.name = inp.value;
      scheduleSave();
    });
  });
  document.querySelectorAll('[data-action="del-item"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!confirm('이 항목을 삭제할까요?')) return;
      tab.budgetItems = tab.budgetItems.filter(i=>i.id!==btn.dataset.itemid);
      renderTabContent(); scheduleSave();
    });
  });
  document.querySelector('[data-action="add-top"]').addEventListener('click', ()=>{
    const nextNum = tab.budgetItems.length+1;
    tab.budgetItems.push({ id:uid(), name:`항목 ${nextNum}`, subItems:[
      { id:uid(), type:'amount', label:'자기자금', amount:0 }
    ]});
    renderTabContent(); scheduleSave();
  });
  document.querySelectorAll('[data-action="add-sub"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const item = tab.budgetItems.find(i=>i.id===btn.dataset.itemid);
      item.subItems.push({ id:uid(), type:'amount', label:'새 항목', amount:0 });
      renderTabContent(); scheduleSave();
    });
  });
  document.querySelectorAll('[data-action="del-sub"]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const item = tab.budgetItems.find(i=>i.id===btn.dataset.itemid);
      item.subItems = item.subItems.filter(s=>s.id!==btn.dataset.subid);
      renderTabContent(); scheduleSave();
    });
  });

  // 세부항목 필드
  document.querySelectorAll('.subitem').forEach(el=>{
    const item = tab.budgetItems.find(i=>i.id===el.dataset.itemid);
    const sub = item.subItems.find(s=>s.id===el.dataset.subid);
    el.querySelectorAll('[data-field]').forEach(inp=>{
      const field = inp.dataset.field;
      if(field==='type'){
        inp.value = sub.type;
        inp.addEventListener('change', ()=>{
          const newType = inp.value;
          const label = sub.label;
          const id = sub.id;
          Object.keys(sub).forEach(k=>delete sub[k]);
          sub.id = id; sub.label = label; sub.type = newType;
          if(newType==='amount') sub.amount = 0;
          if(newType==='saving'){ sub.monthly=0; sub.months=0; sub.rate=0; }
          if(newType==='mortgage'){ sub.principal=0; sub.years=0; sub.rate=0; }
          renderTabContent(); scheduleSave();
        });
        return;
      }
      if(field==='label'){
        inp.value = sub.label;
        inp.addEventListener('input', ()=>{ sub.label = inp.value; scheduleSave(); });
        return;
      }
      // 숫자 필드
      inp.value = (sub[field] || sub[field]===0) ? sub[field] : '';
      inp.addEventListener('input', ()=>{
        sub[field] = Number(inp.value);
        renderTabContent(); scheduleSave();
      });
    });
  });
}

/* ===================== 저장 / 로드 ===================== */
function scheduleSave(){
  const el = document.getElementById('saveStatus');
  el.textContent = '저장 중...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    db.ref(DB_PATH).set(state).then(()=>{
      el.textContent = '저장됨 · ' + new Date().toLocaleTimeString('ko-KR');
    }).catch(err=>{
      el.textContent = '저장 실패';
      console.error(err);
    });
  }, 600);
}

function loadState(cb){
  db.ref(DB_PATH).once('value').then(snap=>{
    const val = snap.val();
    state = val && val.tabs ? val : defaultState();
    activeTabId = state.tabs[0].id;
    cb();
  }).catch(err=>{
    console.error(err);
    state = defaultState();
    activeTabId = state.tabs[0].id;
    cb();
  });
}

/* ===================== 인증 ===================== */
document.getElementById('loginBtn').addEventListener('click', ()=>{
  const provider = new firebase.auth.GoogleAuthProvider();
  document.getElementById('authError').textContent = '';
  auth.signInWithPopup(provider).catch(err=>{
    document.getElementById('authError').textContent = '로그인 실패: ' + err.message;
  });
});
document.getElementById('logoutBtn').addEventListener('click', ()=> auth.signOut());

auth.onAuthStateChanged(user=>{
  if(user && user.email===ALLOWED_EMAIL){
    document.getElementById('authGate').style.display='none';
    document.getElementById('app').style.display='block';
    loadState(render);
  } else {
    document.getElementById('app').style.display='none';
    document.getElementById('authGate').style.display='flex';
    if(user && user.email!==ALLOWED_EMAIL){
      document.getElementById('authError').textContent = '허용되지 않은 계정입니다.';
      auth.signOut();
    }
  }
});
</script>
</body>
